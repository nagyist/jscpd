# Application configuration
[database]
host=localhost
port=5432
name=myapp_db
pool_size=10
timeout=30

[cache]
host=localhost
port=6379
ttl=3600
max_connections=50

[logging]
level=INFO
file=/var/log/myapp/app.log
max_size_mb=100
backup_count=5

[security]
secret_key=change_me_in_production
token_expiry=86400
allowed_hosts=localhost,127.0.0.1

[app]
debug=true
port=8081
workers=2
