# Application properties
database.host=localhost
database.port=5432
database.name=myapp_db
database.pool.size=10
database.timeout=30

cache.host=localhost
cache.port=6379
cache.ttl=3600
cache.max.connections=50

logging.level=INFO
logging.file=/var/log/myapp/app.log
logging.max.size.mb=100
logging.backup.count=5

security.secret.key=change_me_in_production
security.token.expiry=86400
security.allowed.hosts=localhost,127.0.0.1

app.debug=false
app.port=8080
app.workers=4
