# Application configuration

[server]
host     = "localhost"
port     = 8080
debug    = false
timeout  = 30000
max_conn = 100

[database]
host      = "db.example.com"
port      = 5432
name      = "myapp"
user      = "appuser"
password  = "secret"
pool_size = 10
max_idle  = 5
ssl_mode  = "require"

[cache]
driver      = "redis"
host        = "cache.example.com"
port        = 6379
ttl         = 3600
max_entries = 1000
password    = ""

[logging]
level   = "info"
format  = "json"
output  = "stdout"
max_size = 100
backups  = 5

[auth]
jwt_secret    = "change-me-in-production"
token_expiry  = 3600
refresh_expiry = 86400
bcrypt_cost   = 12

# File-specific: products service settings
[products]
max_per_page     = 100
default_per_page = 25
cache_ttl        = 600
image_max_size   = 5242880
